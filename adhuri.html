<h1>अधूरी बातें</h1>

<p class="meta">December 2025</p>

<div class="poem">
कुछ कहानियाँ अधूरी ही रह जानी चाहिए,
कुछ बातें अ-कही ही रह जानी चाहिए।

कुछ चाहतों को ख़ुद तक ही रख लेना चाहिए,
कुछ लम्हों को ख़ुद से ही जी लेना चाहिए।

फिर क्यों आख़िर बेताल छोड़ जाता है आधी बात,
फिर क्यों पूर्णिमा की रात
चाँद एक ही चमकता है।
 
</div>
